<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2027.03.01 自由倒數 🐾</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mochiyopop+One&family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* 全域套用日系圓體 */
        * {
            font-family: 'Zen Maru Gothic', 'Mochiyopop One', sans-serif !important;
        }
        
        body {
            background-image: url('BG.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #87CEEB;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .cartoon-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 4px solid #5D4037; /* 日系深茶色邊框 */
            border-radius: 40px;
            box-shadow: 10px 10px 0px rgba(93, 64, 55, 0.1);
        }

        /* 日系簡約狀態欄 */
        .system-time-box {
            background: #5D4037;
            color: #FFF;
            border-radius: 20px;
            padding: 6px 20px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
        }

        .system-tag {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #FF8A80;
            color: white;
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 2px 2px 0px #5D4037;
        }

        /* 倒數盒子：置中對齊優化 */
        .time-box {
            background: #FFFBF0;
            border: 3px solid #5D4037;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            padding: 4px;
        }

        /* 數字改用 Mochiyopop One 更有日系海報感 */
        .time-box span:first-child {
            font-family: 'Mochiyopop One', sans-serif !important;
            color: #5D4037;
            font-size: 2.2rem;
            line-height: 1.1;
        }

        .time-unit {
            font-size: 13px;
            color: #8D6E63;
            font-weight: 900;
        }

        .speech-bubble {
            background: #FEF9E7;
            border: 3px solid #5D4037;
            border-radius: 25px;
            position: relative;
        }

        .video-container {
            width: 100%;
            border-radius: 30px;
            border: 3px solid #5D4037;
            overflow: hidden;
            background: #fff;
        }

        .celebrate-text {
            color: #FF5252 !important;
            animation: soft-bounce 0.8s infinite alternate;
            display: inline-block;
        }

        @keyframes soft-bounce {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        #progress-bar {
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="cartoon-card w-full max-w-md p-8 text-center relative mx-4">
        
        <div class="system-time-box">
            <span class="system-tag">今の日時 🐾</span>
            <div id="current-date" class="text-[12px] font-bold opacity-80 mb-0.5 tracking-tight">LOADING...</div>
            <div id="current-time" class="text-3xl font-black tabular-nums tracking-widest">00:00:00</div>
        </div>

        <div class="flex justify-center mb-6 video-container">
            <video autoplay loop muted playsinline class="w-full h-auto">
                <source src="輪流探頭動圖製作完成.mp4" type="video/mp4">
            </video>
        </div>

        <h2 class="text-xl font-black mb-6 text-orange-800 border-b-2 border-orange-100 pb-1 inline-block">自由解放日まで、あと...</h2>

        <div class="grid grid-cols-4 gap-3 mb-8">
            <div class="time-box shadow-sm"><span id="days">00</span><span class="time-unit">日</span></div>
            <div class="time-box shadow-sm"><span id="hours">00</span><span class="time-unit">時</span></div>
            <div class="time-box shadow-sm"><span id="mins">00</span><span class="time-unit">分</span></div>
            <div class="time-box shadow-sm"><span id="secs">00</span><span class="time-unit">秒</span></div>
        </div>

        <div class="mb-10 text-left relative px-2">
            <div class="flex justify-between text-[14px] mb-2 font-black text-stone-600">
                <span>🐾 自由進度</span>
                <span id="percent-text">0%</span>
            </div>
            <div class="w-full bg-stone-100 h-5 rounded-full border-2 border-stone-300 relative overflow-hidden">
                <div id="progress-bar" class="h-full bg-gradient-to-r from-orange-300 to-orange-500 transition-all duration-1000" style="width: 0%"></div>
            </div>
        </div>

        <div class="min-h-[100px] flex items-center justify-center speech-bubble p-5 text-center shadow-inner">
            <p id="quote" class="text-[16px] font-bold leading-relaxed text-stone-700">「正在載入自由...🐾」</p>
        </div>

        <div class="mt-8 pt-4 text-[13px] text-stone-400 font-bold italic">
            🐈 自由まで、あと一歩。 🐈
        </div>
    </div>

    <script>
        const targetDate = new Date("March 1, 2027 00:00:00").getTime();
        const startDate = new Date("February 26, 2026 00:00:00").getTime();

        const quotes = [
            "工作只是為了支撐你的貓咪跟遊戲，不是你的全部。",
            "這份薪水包含了一部分的忍耐費。",
            "每天上班都學著放過自己，你已經很棒了!!。",
            "再忍一下，休息是為了以後走更遠的路。",
            "倒數是為了提醒自己，所有的痛苦都有終點。",
            "未來的你在 2027 年 3 月等著你。"
        ];

        let hasConfettiShown = false;

        function update() {
            const now = new Date();
            const nowTime = now.getTime();
            const diff = targetDate - nowTime;

            // 日期顯示調整為日系風格
            const dateOptions = { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' };
            document.getElementById("current-date").innerText = now.toLocaleDateString('zh-TW', dateOptions).replace(/\//g, '.');
            document.getElementById("current-time").innerText = now.toTimeString().split(' ')[0];

            const quoteEl = document.getElementById("quote");
            if (now.getDate() === 25) {
                quoteEl.classList.add("celebrate-text");
                quoteEl.innerText = "✨ 薪水入帳，忍耐費已續約 ✨";
                if (!hasConfettiShown) {
                    launchConfetti();
                    hasConfettiShown = true;
                }
            } else {
                quoteEl.classList.remove("celebrate-text");
                hasConfettiShown = false; 
            }

            if (diff <= 0) {
                document.querySelector(".cartoon-card").innerHTML = "<h1 class='text-4xl font-black p-10 text-stone-800 text-center'>🎉 おめでとう！自由だ！🐾</h1>";
                return;
            }

            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2,'0');
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2,'0');
            document.getElementById("mins").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2,'0');
            document.getElementById("secs").innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2,'0');

            const total = targetDate - startDate;
            const elapsed = nowTime - startDate;
            const progress = Math.min(Math.max((elapsed / total) * 100, 0), 100);
            document.getElementById("progress-bar").style.width = progress + "%";
            document.getElementById("percent-text").innerText = progress.toFixed(5) + "%";
        }

        function launchConfetti() {
            var duration = 4 * 1000;
            var end = Date.now() + duration;
            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 60,
                    origin: { x: 0, y: 0.8 },
                    colors: ['#FFE082', '#FFAB91', '#FF8A80', '#FFFFFF']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 60,
                    origin: { x: 1, y: 0.8 },
                    colors: ['#FFE082', '#FFAB91', '#FF8A80', '#FFFFFF']
                });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        setInterval(() => {
            if (new Date().getDate() !== 25) {
                const q = quotes[Math.floor(Math.random() * quotes.length)];
                document.getElementById("quote").innerText = `「${q}」`;
            }
        }, 8000);

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
