<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2027.03.01 自由倒數 🐾</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-title" content="自由倒數">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;500;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        * {
            font-family: 'Zen Maru Gothic', sans-serif !important;
            letter-spacing: 0.08em;
        }
        
        body {
            background-color: #f4f4f4;
            background-image: url('BG.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.88); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.12);
            padding: 40px;
            color: #444;
            max-width: 400px;
            width: 90%;
            position: relative;
        }

        .header-section {
            text-align: left;
            border-bottom: 2px solid #f1f2f6;
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        #current-time {
            font-size: 3rem;
            font-weight: 300;
            color: #2d3436;
            letter-spacing: -0.02em;
            line-height: 1;
        }

        #current-date {
            font-size: 11px;
            color: #a4b0be;
            text-transform: uppercase;
            margin-top: 8px;
            font-weight: 700;
        }

        .video-wrapper {
            width: 100%;
            border-radius: 25px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            background: #000;
        }

        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .count-item {
            text-align: center;
            background: #ffffff;
            padding: 12px 0;
            border-radius: 15px;
            border: 1px solid #f1f2f6;
        }

        .count-item span:first-child {
            font-size: 1.8rem;
            font-weight: 900;
            color: #0984e3; 
            display: block;
            line-height: 1;
        }

        .count-item span:last-child {
            font-size: 10px;
            color: #636e72;
            font-weight: 900;
            margin-top: 5px;
            display: block;
        }

        .progress-meta {
            font-size: 10px;
            color: #2d3436;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: 900;
        }

        .progress-line-container {
            height: 6px;
            background: #f1f2f6;
            width: 100%;
            position: relative;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-line-active {
            height: 100%;
            background: linear-gradient(to right, #fab1a0, #ff7675); 
            position: absolute;
            left: 0; top: 0;
            transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .quote-box {
            margin-top: 30px;
            text-align: left;
            font-size: 14px;
            color: #2d3436;
            font-weight: 500;
            line-height: 1.6;
            padding: 15px 20px;
            background: #f9f9f9;
            border-radius: 15px;
            border-left: 4px solid #ff7675;
            min-height: 80px;
            display: flex;
            align-items: center;
        }

        .celebrate-mode {
            color: #d63031 !important;
            font-weight: 900;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        
        <div class="header-section">
            <div id="current-time">00:00:00</div>
            <div id="current-date">LOADING...</div>
        </div>

        <div class="video-wrapper">
            <video autoplay loop muted playsinline class="w-full h-auto">
                <source src="輪流探頭動圖製作完成.mp4" type="video/mp4">
            </video>
        </div>

        <div class="countdown-grid">
            <div class="count-item shadow-sm"><span id="days">00</span><span>DAYS</span></div>
            <div class="count-item shadow-sm"><span id="hours">00</span><span>HRS</span></div>
            <div class="count-item shadow-sm"><span id="mins">00</span><span>MINS</span></div>
            <div class="count-item shadow-sm"><span id="secs">00</span><span>SECS</span></div>
        </div>

        <div class="px-1">
            <div class="progress-meta">
                <span>🐾 自由進度</span>
                <span id="percent-text" class="text-rose-500">0.00000%</span>
            </div>
            <div class="progress-line-container">
                <div id="progress-bar" class="progress-line-active" style="width: 0%"></div>
            </div>
        </div>

        <div class="quote-box">
            <p id="quote">正在讀取自由數據...</p>
        </div>

        <div class="mt-10 text-[11px] text-gray-400 tracking-[0.3em] uppercase text-center font-bold">
            自由的貓咪 自由的你 🐾
        </div>
    </div>

    <script>
        const targetDate = new Date("March 1, 2027 00:00:00").getTime();
        const startDate = new Date("February 26, 2026 00:00:00").getTime();

        const quotes = [
            "工作只是為了支撐你的貓咪跟遊戲，不是全部。",
            "這份薪水包含了一部分的忍耐費。",
            "每天上班都學著放過自己，你已經很棒了!!。",
            "再忍一下，休息是為了以後走更遠的路。",
            "倒數是為了提醒自己，所有的痛苦都有終點。",
            "未來的你在 2027 年 3 月等著你。"
        ];

        let hasConfettiShown = false;

        function update() {
            const now = new Date();
            const nowTime = now.getTime();
            const diff = targetDate - nowTime;

            document.getElementById("current-time").innerText = now.toTimeString().split(' ')[0];
            const options = { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' };
            document.getElementById("current-date").innerText = now.toLocaleDateString('zh-TW', options).replace(/\//g, ' . ');

            const quoteEl = document.getElementById("quote");
            if (now.getDate() === 25) {
                quoteEl.classList.add("celebrate-mode");
                quoteEl.innerText = "✨ 本月忍耐費已入帳，辛苦了！ ✨";
                if (!hasConfettiShown) {
                    launchConfetti();
                    hasConfettiShown = true;
                }
            } else {
                quoteEl.classList.remove("celebrate-mode");
                hasConfettiShown = false; 
            }

            if (diff <= 0) {
                document.querySelector(".glass-card").innerHTML = "<h1 class='text-2xl font-black p-10 text-center text-rose-500'>終於，自由了！🐾</h1>";
                return;
            }

            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2,'0');
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2,'0');
            document.getElementById("mins").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2,'0');
            document.getElementById("secs").innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2,'0');

            const total = targetDate - startDate;
            const elapsed = nowTime - startDate;
            const progress = Math.min(Math.max((elapsed / total) * 100, 0), 100);
            document.getElementById("progress-bar").style.width = progress + "%";
            document.getElementById("percent-text").innerText = progress.toFixed(5) + "%";
        }

        function launchConfetti() {
            confetti({ particleCount: 60, spread: 80, origin: { y: 0.8 }, colors: ['#ff7675', '#0984e3', '#ffffff'] });
        }

        setInterval(() => {
            if (new Date().getDate() !== 25) {
                const q = quotes[Math.floor(Math.random() * quotes.length)];
                document.getElementById("quote").innerText = `「${q}」`;
            }
        }, 8000);

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
