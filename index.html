<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2027.03.01 自由倒數 🐾</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #87CEEB;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .cartoon-card {
            background: white;
            border: 4px solid #4a4a4a;
            border-radius: 30px;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.1);
        }

        /* 這裡用 Emoji 代替圖片，保證 100% 顯示 */
        .cat-emoji { font-size: 5rem; line-height: 1; }
        .running-cat {
            position: absolute;
            right: -20px;
            top: -45px;
            font-size: 2rem;
            transition: all 1s linear;
        }

        .time-box {
            background: #f8fafc;
            border: 2px solid #4a4a4a;
            border-radius: 12px;
        }

        .speech-bubble {
            background: #fef3c7;
            border: 2px solid #4a4a4a;
            border-radius: 15px;
            position: relative;
        }
    </style>
</head>
<body>

    <div class="cartoon-card w-full max-w-md p-8 text-center relative mx-4">
        
        <div class="mb-4">
            <div class="cat-emoji">🐈</div>
            <p class="text-xs font-bold text-gray-500">三花保佑 · 招財進寶</p>
        </div>

        <h1 class="text-[10px] uppercase tracking-[0.2em] text-gray-400 mb-1 font-bold">Freedom Countdown</h1>
        <h2 class="text-2xl font-bold mb-6 text-gray-800">自由解放日：2027.03.01</h2>

        <div class="grid grid-cols-4 gap-2 mb-8">
            <div class="time-box p-2">
                <span id="days" class="text-2xl font-black block">00</span>
                <span class="text-[10px] font-bold opacity-60">天</span>
            </div>
            <div class="time-box p-2">
                <span id="hours" class="text-2xl font-black block">00</span>
                <span class="text-[10px] font-bold opacity-60">時</span>
            </div>
            <div class="time-box p-2">
                <span id="mins" class="text-2xl font-black block">00</span>
                <span class="text-[10px] font-bold opacity-60">分</span>
            </div>
            <div class="time-box p-2">
                <span id="secs" class="text-2xl font-black block">00</span>
                <span class="text-[10px] font-bold opacity-60">秒</span>
            </div>
        </div>

        <div class="mb-10 text-left relative">
            <div class="flex justify-between text-[10px] mb-2 font-black text-gray-500">
                <span>自由進度 (黑貓奔跑中)</span>
                <span id="percent-text">0%</span>
            </div>
            <div class="w-full bg-gray-100 h-4 rounded-full border-2 border-gray-400 relative">
                <div id="progress-bar" class="h-full bg-yellow-400 rounded-full transition-all duration-1000" style="width: 0%">
                    <div class="running-cat">🐈‍⬛</div>
                </div>
            </div>
        </div>

        <div class="min-h-[80px] flex items-center justify-center speech-bubble p-4">
            <p id="quote" class="text-sm font-bold leading-relaxed text-gray-700">「正在整理心情...🐾」</p>
        </div>

        <div class="mt-8 pt-4 text-[10px] text-gray-300 font-bold italic">
            * 只要網頁還在跑，自由就不遠了 *
        </div>
    </div>

    <script>
        const targetDate = new Date("March 1, 2027 00:00:00").getTime();
        const startDate = new Date("February 26, 2026 00:00:00").getTime();

        const quotes = [
            "每一分秒的忍耐，都是在為自由存錢。",
            "這個位子不值得你流淚，只值得你倒數。",
            "老闆的囉唆，現在聽起來都像背景音樂。",
            "再忍一下，外面的空氣是甜的。",
            "保持優雅，因為你快要不用看到這群人了。",
            "工作只是為了支撐你的興趣，不是你的全部。",
            "這份薪水包含了一部分的忍耐費。",
            "老闆沒你的日子也會過，但你沒老闆的日子會更好。"
        ];

        function update() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff <= 0) {
                document.querySelector(".cartoon-card").innerHTML = "🎉 自由了！🐾";
                return;
            }

            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2,'0');
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2,'0');
            document.getElementById("mins").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2,'0');
            document.getElementById("secs").innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2,'0');

            const total = targetDate - startDate;
            const elapsed = now - startDate;
            const progress = Math.min(Math.max((elapsed / total) * 100, 0), 100);
            
            document.getElementById("progress-bar").style.width = progress + "%";
            document.getElementById("percent-text").innerText = progress.toFixed(5) + "%";
        }

        setInterval(() => {
            const q = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById("quote").innerText = `「${q}」`;
        }, 10000);

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
