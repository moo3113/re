<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2027.03.01 自由倒數 🐾</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Ma+Shan+Zheng&family=Noto+Sans+TC:wght@900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        * {
            font-family: 'ZCOOL KuaiLe', 'Noto Sans TC', sans-serif !important;
        }
        
        body {
            background-image: url('BG.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #87CEEB;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .cartoon-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 5px solid #4A3728;
            border-radius: 40px;
            box-shadow: 12px 12px 0px rgba(74, 55, 40, 0.2);
        }

        /* --- 更有趣的現在時間：電子儀表板風格 --- */
        .system-time-box {
            background: #2D241E;
            color: #FFD700; /* 金色文字 */
            border-radius: 20px;
            padding: 12px 25px;
            border: 3px solid #4A3728;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            display: inline-block;
            margin-bottom: 25px;
            position: relative;
        }

        .system-tag {
            position: absolute;
            top: -12px;
            right: 15px;
            background: #FF4757;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 5px;
            letter-spacing: 1px;
            font-weight: bold;
            box-shadow: 2px 2px 0px #4A3728;
        }

        /* --- 倒數盒子：解決置中問題 --- */
        .time-box {
            background: #fdf6e3;
            border: 3px solid #4A3728;
            border-radius: 20px;
            aspect-ratio: 1 / 1; /* 確保是正方形 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5px;
        }

        .time-box span:first-child {
            color: #4A3728;
            line-height: 1;
            margin-bottom: 2px;
        }

        .time-unit {
            font-family: 'Ma Shan Zheng', cursive !important;
            color: #8B5E3C;
            font-size: 14px;
            font-weight: bold;
        }

        .speech-bubble {
            background: #FFFBE6;
            border: 3px solid #4A3728;
            border-radius: 25px;
            position: relative;
        }

        .video-container {
            width: 100%;
            border-radius: 30px;
            border: 4px solid #4A3728;
            overflow: hidden;
            background: #fff;
        }

        .celebrate-text {
            color: #FF1493 !important;
            text-shadow: 2px 2px 0px #FFF;
            animation: bounce-cute 0.6s infinite alternate;
            display: inline-block;
        }

        @keyframes bounce-cute {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <div class="cartoon-card w-full max-w-md p-8 text-center relative mx-4">
        
        <div class="system-time-box">
            <span class="system-tag">LIVE NOW</span>
            <div id="current-date" class="text-[11px] font-bold opacity-70 mb-1 tracking-tighter">LOADING...</div>
            <div class="flex items-center justify-center gap-3">
                <div id="current-time" class="text-3xl font-black tracking-widest tabular-nums">00:00:00</div>
            </div>
        </div>

        <div class="flex justify-center mb-6 video-container">
            <video autoplay loop muted playsinline class="w-full h-auto">
                <source src="輪流探頭動圖製作完成.mp4" type="video/mp4">
            </video>
        </div>

        <h2 class="text-2xl font-black mb-6 text-sky-800 border-b-4 border-yellow-300 pb-1 inline-block">自由解放：2027.03.01</h2>

        <div class="grid grid-cols-4 gap-3 mb-8">
            <div class="time-box shadow-md"><span id="days" class="text-4xl font-black">00</span><span class="time-unit">天</span></div>
            <div class="time-box shadow-md"><span id="hours" class="text-4xl font-black">00</span><span class="time-unit">時</span></div>
            <div class="time-box shadow-md"><span id="mins" class="text-4xl font-black">00</span><span class="time-unit">分</span></div>
            <div class="time-box shadow-md"><span id="secs" class="text-4xl font-black">00</span><span class="time-unit">秒</span></div>
        </div>

        <div class="mb-10 text-left relative px-2">
            <div class="flex justify-between text-[15px] mb-2 font-black text-orange-600">
                <span>🐾 自由進度</span>
                <span id="percent-text" class="text-orange-700">0%</span>
            </div>
            <div class="w-full bg-stone-200 h-6 rounded-full border-3 border-stone-400 relative overflow-hidden">
                <div id="progress-bar" class="h-full bg-gradient-to-r from-pink-400 via-orange-500 to-yellow-300 rounded-full transition-all duration-1000" style="width: 0%"></div>
            </div>
        </div>

        <div class="min-h-[100px] flex items-center justify-center speech-bubble p-5 text-center shadow-inner">
            <p id="quote" class="text-[17px] font-bold leading-relaxed text-slate-700">「正在載入自由...🐾」</p>
        </div>

        <div class="mt-8 pt-4 text-[13px] text-stone-400 font-bold italic">
            🐈 每一秒鐘，都在變回自由的貓 🐈
        </div>
    </div>

    <script>
        const targetDate = new Date("March 1, 2027 00:00:00").getTime();
        const startDate = new Date("February 26, 2026 00:00:00").getTime();

        const quotes = [
            "工作只是為了支撐你的貓咪跟遊戲，不是你的全部。",
            "這份薪水包含了一部分的忍耐費。",
            "每天上班都學著放過自己，你已經很棒了!!。",
            "再忍一下，休息是為了以後走更遠的路。",
            "倒數是為了提醒自己，所有的痛苦都有終點。",
            "未來的你在 2027 年 3 月等著你。"
        ];

        let hasConfettiShown = false;

        function update() {
            const now = new Date();
            const nowTime = now.getTime();
            const diff = targetDate - nowTime;

            const dateOptions = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' };
            document.getElementById("current-date").innerText = now.toLocaleDateString('zh-TW', dateOptions);
            document.getElementById("current-time").innerText = now.toTimeString().split(' ')[0];

            const quoteEl = document.getElementById("quote");
            if (now.getDate() === 25) {
                quoteEl.classList.add("celebrate-text");
                quoteEl.innerText = "✨ 薪水入帳，忍耐費已續約 ✨";
                if (!hasConfettiShown) {
                    launchConfetti();
                    hasConfettiShown = true;
                }
            } else {
                quoteEl.classList.remove("celebrate-text");
                hasConfettiShown = false; 
            }

            if (diff <= 0) {
                document.querySelector(".cartoon-card").innerHTML = "<h1 class='text-4xl font-bold p-10 text-gray-800 text-center'>🎉 你自由了！🐾</h1>";
                return;
            }

            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2,'0');
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2,'0');
            document.getElementById("mins").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2,'0');
            document.getElementById("secs").innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2,'0');

            const total = targetDate - startDate;
            const elapsed = nowTime - startDate;
            const progress = Math.min(Math.max((elapsed / total) * 100, 0), 100);
            document.getElementById("progress-bar").style.width = progress + "%";
            document.getElementById("percent-text").innerText = progress.toFixed(5) + "%";
        }

        function launchConfetti() {
            var duration = 4 * 1000;
            var end = Date.now() + duration;
            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 60,
                    origin: { x: 0, y: 0.8 },
                    colors: ['#FFC0CB', '#FF69B4', '#FFD700', '#48dbfb', '#FFFFFF']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 60,
                    origin: { x: 1, y: 0.8 },
                    colors: ['#FFC0CB', '#FF69B4', '#FFD700', '#48dbfb', '#FFFFFF']
                });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        setInterval(() => {
            if (new Date().getDate() !== 25) {
                const q = quotes[Math.floor(Math.random() * quotes.length)];
                document.getElementById("quote").innerText = `「${q}」`;
            }
        }, 6000);

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
