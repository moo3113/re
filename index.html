<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2027.03.01 自由倒數 🐾</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@700;800&family=Nanum+Pen+Script&family=Noto+Serif+TC:wght@900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* 全域套用日系文青襯線體 */
        * {
            font-family: 'Kaisei Tokumin', 'Noto Serif TC', serif !important;
        }
        
        body {
            background-image: url('BG.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #F4F1EA; /* 日系米色底 */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .magazine-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            border: 1px solid #D1D5DB;
            border-radius: 20px; /* 較小的圓角，增加精緻感 */
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        }

        /* 簡約的時間標籤 */
        .time-label {
            font-family: 'Nanum Pen Script', cursive !important;
            font-size: 1.5rem;
            color: #576574;
            margin-bottom: 5px;
        }

        /* 倒數盒子：極簡線條感 */
        .time-box {
            background: transparent;
            border-bottom: 2px solid #576574; /* 只有底線，像日系排版 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
        }

        .time-box span:first-child {
            color: #222f3e;
            font-size: 2.5rem;
            font-weight: 800;
        }

        .time-unit {
            font-size: 12px;
            color: #8395a7;
            font-weight: bold;
            margin-top: -5px;
        }

        .speech-bubble {
            background: #FDFEFE;
            border-left: 4px solid #576574; /* 側邊線條感 */
            padding-left: 1.5rem;
            margin-top: 2rem;
        }

        .video-container {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #eee;
        }

        /* 進度條：細緻灰藍色 */
        .progress-line {
            height: 4px;
            background: #EEF2F3;
            border-radius: 10px;
        }

        .celebrate-text {
            color: #ee5253 !important;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="magazine-card w-full max-w-md p-10 text-center relative mx-4">
        
        <div class="mb-8">
            <div class="time-label">Today is...</div>
            <div id="current-date" class="text-sm tracking-widest text-gray-400 mb-1">2026.03.01</div>
            <div id="current-time" class="text-4xl font-light text-slate-700 tabular-nums tracking-tighter">00:00:00</div>
        </div>

        <div class="flex justify-center mb-8 video-container">
            <video autoplay loop muted playsinline class="w-full h-auto opacity-90">
                <source src="輪流探頭動圖製作完成.mp4" type="video/mp4">
            </video>
        </div>

        <div class="text-left mb-8">
            <h2 class="text-xs uppercase tracking-[0.4em] text-gray-400 mb-2">— Countdown to Freedom</h2>
            <h3 class="text-xl font-bold text-slate-800">2027.03.01 解放</h3>
        </div>

        <div class="grid grid-cols-4 gap-6 mb-10">
            <div class="time-box"><span id="days">00</span><span class="time-unit">DAYS</span></div>
            <div class="time-box"><span id="hours">00</span><span class="time-unit">HOURS</span></div>
            <div class="time-box"><span id="mins">00</span><span class="time-unit">MINS</span></div>
            <div class="time-box"><span id="secs">00</span><span class="time-unit">SECS</span></div>
        </div>

        <div class="mb-10 text-left px-1">
            <div class="flex justify-between text-[10px] mb-2 tracking-widest text-gray-400">
                <span>PROGRESS</span>
                <span id="percent-text">0%</span>
            </div>
            <div class="progress-line relative overflow-hidden">
                <div id="progress-bar" class="h-full bg-slate-400 transition-all duration-1000" style="width: 0%"></div>
            </div>
        </div>

        <div class="speech-bubble text-left">
            <p id="quote" class="text-sm italic leading-relaxed text-slate-600 font-light">正在載入自由...</p>
        </div>

        <div class="mt-10 text-[10px] text-gray-300 tracking-[0.2em]">
            SINCE 2026 / BY CAT LOVER
        </div>
    </div>

    <script>
        const targetDate = new Date("March 1, 2027 00:00:00").getTime();
        const startDate = new Date("February 26, 2026 00:00:00").getTime();

        const quotes = [
            "工作只是為了支撐你的貓咪跟遊戲，不是你的全部。",
            "這份薪水包含了一部分的忍耐費。",
            "每天上班都學著放過自己，你已經很棒了!!。",
            "再忍一下，休息是為了以後走更遠的路。",
            "倒數是為了提醒自己，所有的痛苦都有終點。",
            "未來的你在 2027 年 3 月等著你。"
        ];

        let hasConfettiShown = false;

        function update() {
            const now = new Date();
            const nowTime = now.getTime();
            const diff = targetDate - nowTime;

            document.getElementById("current-date").innerText = now.toLocaleDateString('zh-TW').replace(/\//g, '.');
            document.getElementById("current-time").innerText = now.toTimeString().split(' ')[0];

            const quoteEl = document.getElementById("quote");
            if (now.getDate() === 25) {
                quoteEl.classList.add("celebrate-text");
                quoteEl.innerText = "薪水入帳，忍耐費已續約。";
                if (!hasConfettiShown) {
                    launchConfetti();
                    hasConfettiShown = true;
                }
            } else {
                quoteEl.classList.remove("celebrate-text");
                hasConfettiShown = false; 
            }

            if (diff <= 0) {
                document.querySelector(".magazine-card").innerHTML = "<h1 class='text-2xl font-bold p-10 text-slate-800 text-center'>Free at last.</h1>";
                return;
            }

            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2,'0');
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2,'0');
            document.getElementById("mins").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2,'0');
            document.getElementById("secs").innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2,'0');

            const total = targetDate - startDate;
            const elapsed = nowTime - startDate;
            const progress = Math.min(Math.max((elapsed / total) * 100, 0), 100);
            document.getElementById("progress-bar").style.width = progress + "%";
            document.getElementById("percent-text").innerText = progress.toFixed(5) + "%";
        }

        function launchConfetti() {
            confetti({ particleCount: 40, spread: 70, origin: { y: 0.8 }, colors: ['#8395a7', '#222f3e'] });
        }

        setInterval(() => {
            if (new Date().getDate() !== 25) {
                const q = quotes[Math.floor(Math.random() * quotes.length)];
                document.getElementById("quote").innerText = q;
            }
        }, 8000);

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
