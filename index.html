<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2027.03.01 自由倒數 🐾</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #87CEEB; /* 自由的天藍色 */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .cartoon-card {
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid #333;
            border-radius: 30px;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.15);
        }

        .time-box {
            background: #fdf6e3;
            border: 2px solid #333;
            border-radius: 12px;
        }

        /* 黑貓跑步動圖動畫控制 */
        .cat-runner-gif {
            position: absolute;
            right: -25px; /* 調整貓咪位置 */
            top: -50px; /* 調整貓咪高度 */
            width: 60px; /* 黑貓動圖大小 */
            height: 60px;
            transition: all 1s linear;
        }

        .speech-bubble {
            background: #fff9db;
            border: 2px solid #333;
            border-radius: 15px;
            position: relative;
        }
    </style>
</head>
<body>

    <div class="cartoon-card w-full max-w-md p-8 text-center relative mx-4">
        
        <div class="flex justify-center mb-4">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/3o72EX5QZ9N9d51dqo/giphy.gif" alt="Cartoon Calico Cat GIF" class="w-28 h-28 object-contain">
        </div>

        <h1 class="text-[10px] uppercase tracking-[0.2em] text-gray-400 mb-1 font-bold">Freedom Countdown</h1>
        <h2 class="text-2xl font-bold mb-6 text-gray-800 border-b-2 border-gray-100 pb-2">自由解放日：2027.03.01</h2>

        <div class="grid grid-cols-4 gap-2 mb-8">
            <div class="time-box p-2">
                <span id="days" class="text-2xl font-black block text-gray-700">00</span>
                <span class="text-[10px] font-bold opacity-60 text-gray-500">天</span>
            </div>
            <div class="time-box p-2">
                <span id="hours" class="text-2xl font-black block text-gray-700">00</span>
                <span class="text-[10px] font-bold opacity-60 text-gray-500">時</span>
            </div>
            <div class="time-box p-2">
                <span id="mins" class="text-2xl font-black block text-gray-700">00</span>
                <span class="text-[10px] font-bold opacity-60 text-gray-500">分</span>
            </div>
            <div class="time-box p-2">
                <span id="secs" class="text-2xl font-black block text-gray-700">00</span>
                <span class="text-[10px] font-bold opacity-60 text-gray-500">秒</span>
            </div>
        </div>

        <div class="mb-10 text-left relative px-2">
            <div class="flex justify-between text-[11px] mb-2 font-bold text-gray-600">
                <span>自由進度（黑貓衝刺中）</span>
                <span id="percent-text">0%</span>
            </div>
            <div class="w-full bg-gray-200 h-4 rounded-full border-2 border-gray-400 relative">
                <div id="progress-bar" class="h-full bg-yellow-400 rounded-full transition-all duration-1000" style="width: 0%">
                    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/Jm6E0b9W9T1mP6y3u3/giphy.gif" class="cat-runner-gif" alt="Cartoon Black Cat Running GIF">
                </div>
            </div>
        </div>

        <div class="min-h-[80px] flex items-center justify-center speech-bubble p-4">
            <p id="quote" class="text-sm font-bold leading-relaxed text-gray-700 text-center">「正在載入自由...🐾」</p>
        </div>

        <div class="mt-8 pt-4 text-[11px] text-gray-400 font-bold">
            🐈 三花招財，黑貓避邪，2027 準時自由！
        </div>
    </div>

    <script>
        const targetDate = new Date("March 1, 2027 00:00:00").getTime();
        const startDate = new Date("February 26, 2026 00:00:00").getTime();

        const quotes = [
            "工作只是為了支撐你的興趣，不是你的全部。",
            "這份薪水包含了一部分的忍耐費。",
            "老闆沒你的日子也會過，但你沒老闆的日子會更好。",
            "再忍一下，你值得擁有不用設鬧鐘的生活。",
            "倒數是為了提醒自己，所有的痛苦都有終點。",
            "未來的你在 2027 年 3 月等著你。"
        ];

        function update() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff <= 0) {
                document.querySelector(".cartoon-card").innerHTML = `
                    <div class="text-center p-10">
                        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/m4a2mKxU9B3YlO2Z4Y/giphy.gif" class="w-32 h-32 mx-auto mb-4">
                        <h1 class='text-4xl font-bold text-gray-800'>🎉 你自由了！🐾</h1>
                        <p class='text-lg font-bold text-gray-600 mt-2'>恭喜登出成功！</p>
                    </div>
                `;
                return;
            }

            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2,'0');
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2,'0');
            document.getElementById("mins").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2,'0');
            document.getElementById("secs").innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2,'0');

            const total = targetDate - startDate;
            const elapsed = now - startDate;
            const progress = Math.min(Math.max((elapsed / total) * 100, 0), 100);
            
            document.getElementById("progress-bar").style.width = progress + "%";
            document.getElementById("percent-text").innerText = progress.toFixed(5) + "%";
        }

        setInterval(() => {
            const q = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById("quote").innerText = `「${q}」`;
        }, 12000);

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
