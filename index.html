<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2027.03.01 自由倒數 🐾</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-title" content="自由倒數">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;500;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        * {
            font-family: 'Zen Maru Gothic', sans-serif !important;
            letter-spacing: 0.12em; /* 極寬字距，日本高級感 */
        }
        
        body {
            background-color: #f4f4f4;
            background-image: url('BG.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        /* 磨砂玻璃卡片：日系清透感 */
        .glass-card {
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.05);
            padding: 45px;
            color: #444;
            max-width: 400px;
            width: 90%;
            position: relative;
        }

        /* 現在時間：極致纖細 */
        .header-section {
            text-align: left;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            padding-bottom: 25px;
            margin-bottom: 30px;
        }

        #current-time {
            font-size: 3.2rem;
            font-weight: 300;
            color: #222;
            letter-spacing: -0.05em;
            line-height: 1;
        }

        #current-date {
            font-size: 10px;
            color: #999;
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* 影片容器：不再有厚重邊框 */
        .video-wrapper {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        /* 倒數區域：不對稱排版，更有設計感 */
        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 35px;
        }

        .count-item {
            text-align: center;
        }

        .count-item span:first-child {
            font-size: 1.8rem;
            font-weight: 900;
            color: #333;
            display: block;
            line-height: 1;
        }

        .count-item span:last-child {
            font-size: 9px;
            color: #A5A5A5;
            font-weight: 700;
            margin-top: 5px;
            display: block;
        }

        /* 精緻進度條：呼吸感點狀線 */
        .progress-meta {
            font-size: 9px;
            color: #CCC;
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .progress-line-container {
            height: 2px;
            background: rgba(0, 0, 0, 0.03);
            width: 100%;
            position: relative;
        }

        .progress-line-active {
            height: 2px;
            background: #B49667; /* 晨曦金 */
            position: absolute;
            left: 0; top: 0;
            transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* 對白：像詩一樣安靜 */
        .quote-box {
            margin-top: 35px;
            text-align: left;
            font-size: 14px;
            color: #666;
            font-weight: 300;
            line-height: 2;
            padding-left: 15px;
            border-left: 1px solid #B49667;
        }

        .celebrate-mode {
            color: #B49667 !important;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        
        <div class="header-section">
            <div id="current-time">00:00:00</div>
            <div id="current-date">LOADING...</div>
        </div>

        <div class="video-wrapper">
            <video autoplay loop muted playsinline class="w-full h-auto opacity-95">
                <source src="輪流探頭動圖製作完成.mp4" type="video/mp4">
            </video>
        </div>

        <div class="countdown-grid">
            <div class="count-item"><span id="days">00</span><span>DAYS</span></div>
            <div class="count-item"><span id="hours">00</span><span>HRS</span></div>
            <div class="count-item"><span id="mins">00</span><span>MINS</span></div>
            <div class="count-item"><span id="secs">00</span><span>SECS</span></div>
        </div>

        <div class="px-1">
            <div class="progress-meta">
                <span>STAY FREE</span>
                <span id="percent-text">0.00000%</span>
            </div>
            <div class="progress-line-container">
                <div id="progress-bar" class="progress-line-active" style="width: 0%"></div>
            </div>
        </div>

        <div class="quote-box">
            <p id="quote">靜候自由的氣息。</p>
        </div>

        <div class="mt-10 text-[8px] text-gray-300 tracking-[0.6em] uppercase text-center">
            Breath . Cat . Freedom
        </div>
    </div>

    <script>
        const targetDate = new Date("March 1, 2027 00:00:00").getTime();
        const startDate = new Date("February 26, 2026 00:00:00").getTime();

        const quotes = [
            "工作是為了吸貓，不是全部。",
            "這份薪水包含了一部分的忍耐費。",
            "每天學著放過自己，你已經很棒了。",
            "再忍一下，休息是為了以後走更遠的路。",
            "所有的痛苦都有終點。",
            "未來的你在 2027 年等待著。"
        ];

        let hasConfettiShown = false;

        function update() {
            const now = new Date();
            const nowTime = now.getTime();
            const diff = targetDate - nowTime;

            document.getElementById("current-time").innerText = now.toTimeString().split(' ')[0];
            const options = { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' };
            document.getElementById("current-date").innerText = now.toLocaleDateString('zh-TW', options).replace(/\//g, ' / ');

            const quoteEl = document.getElementById("quote");
            if (now.getDate() === 25) {
                quoteEl.classList.add("celebrate-mode");
                quoteEl.innerText = "本月忍耐費已結清。辛苦了。";
                if (!hasConfettiShown) {
                    launchConfetti();
                    hasConfettiShown = true;
                }
            } else {
                quoteEl.classList.remove("celebrate-mode");
                hasConfettiShown = false; 
            }

            if (diff <= 0) {
                document.querySelector(".glass-card").innerHTML = "<h1 class='text-xl font-light p-10 text-center'>Free.</h1>";
                return;
            }

            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2,'0');
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2,'0');
            document.getElementById("mins").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2,'0');
            document.getElementById("secs").innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2,'0');

            const total = targetDate - startDate;
            const elapsed = nowTime - startDate;
            const progress = Math.min(Math.max((elapsed / total) * 100, 0), 100);
            document.getElementById("progress-bar").style.width = progress + "%";
            document.getElementById("percent-text").innerText = progress.toFixed(5) + "%";
        }

        function launchConfetti() {
            confetti({ particleCount: 20, spread: 80, origin: { y: 0.8 }, colors: ['#B49667', '#FFFFFF'] });
        }

        setInterval(() => {
            if (new Date().getDate() !== 25) {
                const q = quotes[Math.floor(Math.random() * quotes.length)];
                document.getElementById("quote").innerText = q;
            }
        }, 8000);

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
