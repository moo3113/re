<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2027.03.01 自由倒數 🐾</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 引入圓潤字體：Kosugi Maru (中日文) 與 Fredoka (數字) */
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Kosugi+Maru&family=Noto+Sans+TC:wght@500;900&display=swap');
        
        body {
            /* 主要字體設定 */
            font-family: 'Kosugi Maru', 'Noto Sans TC', sans-serif;
            background-image: url('BG.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #87CEEB;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
            color: #4A3728; /* 改為深咖啡色，更有溫度 */
        }

        .cartoon-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 4px solid #4A3728;
            border-radius: 40px; /* 更圓潤 */
            box-shadow: 10px 10px 0px rgba(74, 55, 40, 0.2);
        }

        /* 數字專用字體 */
        .font-numeric {
            font-family: 'Fredoka', sans-serif;
        }

        .time-box {
            background: #fdf6e3;
            border: 3px solid #4A3728; /* 邊框加粗一點 */
            border-radius: 15px;
            box-shadow: 4px 4px 0px rgba(74, 55, 40, 0.1);
        }

        .speech-bubble {
            background: #fff9db;
            border: 3px solid #4A3728;
            border-radius: 20px;
            position: relative;
        }

        /* 對話框小尾巴 */
        .speech-bubble::after {
            content: '';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 0 15px 15px 15px;
            border-style: solid;
            border-color: transparent transparent #4A3728 transparent;
        }

        .video-container {
            width: 100%;
            border-radius: 25px;
            border: 3px solid #4A3728;
            overflow: hidden;
            background: #fff;
        }

        .tabular-nums {
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>

    <div class="cartoon-card w-full max-w-md p-8 text-center relative mx-4">
        
        <div class="flex justify-center mb-6 video-container">
            <video autoplay loop muted playsinline class="w-full h-auto">
                <source src="輪流探頭動圖製作完成.mp4" type="video/mp4">
                你的瀏覽器不支援影片播放。
            </video>
        </div>

        <div class="mb-4">
            <div id="current-date" class="text-[14px] font-bold text-orange-600 tracking-widest font-numeric">2026.03.01 SUNDAY</div>
            <div id="current-time" class="text-5xl font-bold text-gray-800 tabular-nums font-numeric">00:00:00</div>
        </div>

        <h1 class="text-[11px] uppercase tracking-[0.3em] text-gray-400 mb-1 font-bold font-numeric">Freedom Countdown</h1>
        <h2 class="text-2xl font-black mb-6 border-b-4 border-yellow-200 pb-2">自由解放日：2027.03.01</h2>

        <div class="grid grid-cols-4 gap-2 mb-8">
            <div class="time-box p-2">
                <span id="days" class="text-3xl font-bold block font-numeric">00</span>
                <span class="text-[11px] font-bold opacity-70">DAYS</span>
            </div>
            <div class="time-box p-2">
                <span id="hours" class="text-3xl font-bold block font-numeric">00</span>
                <span class="text-[11px] font-bold opacity-70">HRS</span>
            </div>
            <div class="time-box p-2">
                <span id="mins" class="text-3xl font-bold block font-numeric">00</span>
                <span class="text-[11px] font-bold opacity-70">MINS</span>
            </div>
            <div class="time-box p-2">
                <span id="secs" class="text-3xl font-bold block font-numeric">00</span>
                <span class="text-[11px] font-bold opacity-70">SECS</span>
            </div>
        </div>

        <div class="mb-10 text-left relative px-2">
            <div class="flex justify-between text-[12px] mb-2 font-black">
                <span>自由進度</span>
                <span id="percent-text" class="font-numeric">0%</span>
            </div>
            <div class="w-full bg-white h-5 rounded-full border-3 border-gray-800 relative overflow-hidden">
                <div id="progress-bar" class="h-full bg-gradient-to-r from-yellow-300 via-orange-400 to-red-400 rounded-full transition-all duration-1000" style="width: 0%"></div>
            </div>
        </div>

        <div class="min-h-[90px] flex items-center justify-center speech-bubble p-4 text-center">
            <p id="quote" class="text-base font-bold leading-relaxed">「正在載入自由...🐾」</p>
        </div>

        <div class="mt-8 pt-4 text-[12px] text-gray-500 font-bold">
            🐈 每一秒都在離自由更近一點 🐾
        </div>
    </div>

    <script>
        const targetDate = new Date("March 1, 2027 00:00:00").getTime();
        const startDate = new Date("February 26, 2026 00:00:00").getTime();

        const quotes = [
            "工作只是為了支撐你的貓咪跟遊戲，不是你的全部。",
            "這份薪水包含了一部分的忍耐費。",
            "每天上班都學著放過自己，你已經很棒了!!。",
            "再忍一下，休息是為了以後走更遠的路。",
            "倒數是為了提醒自己，所有的痛苦都有終點。",
            "未來的你在 2027 年 3 月等著你。",
            "罐罐不會自己變出來，再撐一下！🐾",
            "自由的空氣...聞起來像貓草的味道。"
        ];

        function update() {
            const now = new Date();
            const nowTime = now.getTime();
            const diff = targetDate - nowTime;

            const dateStr = now.toLocaleDateString('en-US', { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'long' }).toUpperCase();
            document.getElementById("current-date").innerText = dateStr;
            document.getElementById("current-time").innerText = now.toTimeString().split(' ')[0];

            if (diff <= 0) {
                document.querySelector(".cartoon-card").innerHTML = "<h1 class='text-4xl font-bold p-10 text-gray-800 text-center'>🎉 你自由了！🐾</h1>";
                return;
            }

            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2,'0');
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2,'0');
            document.getElementById("mins").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2,'0');
            document.getElementById("secs").innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2,'0');

            const total = targetDate - startDate;
            const elapsed = nowTime - startDate;
            const progress = Math.min(Math.max((elapsed / total) * 100, 0), 100);
            
            document.getElementById("progress-bar").style.width = progress + "%";
            document.getElementById("percent-text").innerText = progress.toFixed(5) + "%";
        }

        setInterval(() => {
            const q = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById("quote").innerText = `「${q}」`;
        }, 5000);

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
