<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2027.03.01 自由倒數 🐾</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="自由倒數">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bakudai&family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* 標題與單位使用書法感字體，數字使用圓體 */
        * {
            font-family: 'Zen Maru Gothic', sans-serif !important;
            letter-spacing: 0.05em;
        }
        
        body {
            background-color: #e8e4da; /* 傳統和紙色 */
            background-image: url('BG.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        /* 調整：紮實的宣紙質感卡片 */
        .ukiyo-card {
            background: #fdfcf8; /* 極紮實的乳白色 */
            border: 4px solid #2d3436; /* 濃墨色邊框 */
            border-radius: 10px; /* 較小的圓角，更有古代卷軸感 */
            box-shadow: 15px 15px 0px rgba(45, 52, 70, 0.1);
            padding: 35px;
            color: #2d3436;
            position: relative;
        }

        /* 朱紅色落款標籤：就像浮世繪上的印章 */
        .stamp-tag {
            background: #d63031; /* 朱砂紅 */
            color: #ffffff;
            padding: 5px 15px;
            font-weight: 900;
            display: inline-block;
            margin-bottom: 20px;
            writing-mode: horizontal-tb;
            box-shadow: 2px 2px 0px #000;
        }

        /* 倒數盒子：方塊感與水墨邊框 */
        .time-box {
            background: #ffffff;
            border: 2px solid #2d3436;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            position: relative;
        }
        .time-box::after {
            content: '';
            position: absolute;
            top: 2px; left: 2px; right: -4px; bottom: -4px;
            border: 1px solid rgba(0,0,0,0.1);
            z-index: -1;
        }

        .time-box span:first-child {
            color: #2d3436;
            font-size: 2.2rem;
            font-weight: 900;
            line-height: 1;
        }

        .time-unit {
            font-family: 'Bakudai', serif !important; /* 書法體單位 */
            font-size: 14px;
            color: #d63031;
            margin-top: 5px;
            font-weight: 900;
        }

        .video-container {
            width: 100%;
            border: 3px solid #2d3436;
            overflow: hidden;
            background: #000;
            margin-bottom: 25px;
        }

        /* 進度條：水墨刷過感 */
        .progress-outer {
            height: 12px;
            background: #eee;
            border: 2px solid #2d3436;
            margin: 15px 0;
            overflow: hidden;
        }
        .progress-inner {
            height: 100%;
            background: #2d3436; /* 純墨色進度 */
            transition: width 1s ease-in-out;
        }

        .quote-bubble {
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            padding: 15px 0;
            margin-top: 20px;
            font-size: 15px;
            color: #636e72;
            font-weight: 700;
        }

        .celebrate-text {
            color: #d63031 !important;
            font-style: normal;
            border: 1px solid #d63031;
            padding: 2px 5px;
        }
    </style>
</head>
<body>

    <div class="ukiyo-card w-full max-w-sm text-center mx-4">
        
        <div class="stamp-tag">
            <span id="current-time" class="text-2xl tabular-nums">00:00:00</span>
        </div>
        <div id="current-date" class="text-[12px] font-bold text-gray-400 mb-6">LOADING...</div>

        <div class="video-container shadow-md">
            <video autoplay loop muted playsinline class="w-full h-auto">
                <source src="輪流探頭動圖製作完成.mp4" type="video/mp4">
            </video>
        </div>

        <div class="text-left mb-6">
            <h2 class="text-[10px] font-bold text-gray-400 tracking-[0.3em] uppercase mb-1">— 自由。猫</h2>
            <h3 class="text-xl font-black text-gray-800" style="font-family: 'Bakudai', serif !important;">二零二七年三月一日 解放</h3>
        </div>

        <div class="grid grid-cols-4 gap-2 mb-8">
            <div class="time-box shadow-sm"><span id="days">00</span><span class="time-unit">日</span></div>
            <div class="time-box shadow-sm"><span id="hours">00</span><span class="time-unit">時</span></div>
            <div class="time-box shadow-sm"><span id="mins">00</span><span class="time-unit">分</span></div>
            <div class="time-box shadow-sm"><span id="secs">00</span><span class="time-unit">秒</span></div>
        </div>

        <div class="px-1 text-left">
            <div class="flex justify-between text-[11px] font-bold text-gray-500 mb-1">
                <span>進度自律</span>
                <span id="percent-text" class="text-red-600">0%</span>
            </div>
            <div class="progress-outer">
                <div id="progress-bar" class="progress-inner" style="width: 0%"></div>
            </div>
        </div>

        <div class="quote-bubble">
            <p id="quote">正在參悟自由之道...</p>
        </div>

        <div class="mt-8 text-[11px] text-gray-300 font-bold italic tracking-[0.2em]">
            🐈 自由とは、己の道を行くこと。 🐾
        </div>
    </div>

    <script>
        const targetDate = new Date("March 1, 2027 00:00:00").getTime();
        const startDate = new Date("February 26, 2026 00:00:00").getTime();

        const quotes = [
            "工作是為了吸貓，不是全部。",
            "這份薪水包含了一部分的忍耐費。",
            "每天學著放過自己，你已經很棒了。",
            "再忍一下，休息是為了以後走更遠的路。",
            "所有的痛苦都有終點。",
            "未來的你在 2027 年等待著。"
        ];

        let hasConfettiShown = false;

        function update() {
            const now = new Date();
            const nowTime = now.getTime();
            const diff = targetDate - nowTime;

            const dateStr = now.toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' });
            document.getElementById("current-date").innerText = dateStr.replace(/\//g, ' 年 ').concat(' 日');
            document.getElementById("current-time").innerText = now.toTimeString().split(' ')[0];

            const quoteEl = document.getElementById("quote");
            if (now.getDate() === 25) {
                quoteEl.classList.add("celebrate-text");
                quoteEl.innerText = "✨ 忍耐費已入帳，辛苦了。 ✨";
                if (!hasConfettiShown) {
                    launchConfetti();
                    hasConfettiShown = true;
                }
            } else {
                quoteEl.classList.remove("celebrate-text");
                hasConfettiShown = false; 
            }

            if (diff <= 0) {
                document.querySelector(".ukiyo-card").innerHTML = "<h1 class='text-2xl font-black p-10 text-gray-800 text-center'>自由成真。</h1>";
                return;
            }

            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2,'0');
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2,'0');
            document.getElementById("mins").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2,'0');
            document.getElementById("secs").innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2,'0');

            const total = targetDate - startDate;
            const elapsed = nowTime - startDate;
            const progress = Math.min(Math.max((elapsed / total) * 100, 0), 100);
            document.getElementById("progress-bar").style.width = progress + "%";
            document.getElementById("percent-text").innerText = progress.toFixed(5) + "%";
        }

        function launchConfetti() {
            confetti({ particleCount: 50, spread: 70, origin: { y: 0.8 }, colors: ['#d63031', '#2d3436', '#ffffff'] });
        }

        setInterval(() => {
            if (new Date().getDate() !== 25) {
                const q = quotes[Math.floor(Math.random() * quotes.length)];
                document.getElementById("quote").innerText = q;
            }
        }, 8000);

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
