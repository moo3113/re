<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2027.03.01 自由倒數 🐾</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="自由倒數">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        * {
            font-family: 'Zen Maru Gothic', sans-serif !important;
            letter-spacing: 0.06em;
        }
        
        body {
            background-color: #d1d8e0;
            background-image: url('BG.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        /* 調整：底色更紮實明顯的卡片 */
        .magazine-card {
            background: rgba(255, 255, 255, 0.98); /* 幾乎不透明的潔白底色 */
            border: 1px solid #e2e8f0;
            border-radius: 45px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.25);
            padding: 35px;
            color: #2f3542;
        }

        /* 現在時間：深夜藍標籤，對比度極高 */
        .current-time-tag {
            background: #1e3799; 
            color: #ffffff;
            border-radius: 24px;
            padding: 12px 30px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(30, 55, 153, 0.3);
        }

        /* 倒數盒子：維持雜誌感但邊框加深 */
        .time-box {
            background: #f8fafc;
            border: 2px solid #cbd5e1;
            border-radius: 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .time-box:hover {
            border-color: #1e3799;
            background: #ffffff;
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .time-box span:first-child {
            color: #1e272e;
            font-size: 2.4rem;
            font-weight: 900;
            line-height: 1;
        }

        .time-unit {
            font-size: 11px;
            color: #64748b;
            margin-top: 6px;
            font-weight: 700;
        }

        .video-container {
            width: 100%;
            border-radius: 35px;
            overflow: hidden;
            border: 2px solid #f1f5f9;
            margin-bottom: 25px;
            background: #000;
        }

        /* 進度條：更紮實的珊瑚色 */
        .progress-outer {
            height: 10px;
            background: #f1f5f9;
            border-radius: 20px;
            margin: 18px 0;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }
        .progress-inner {
            height: 100%;
            background: linear-gradient(to right, #eb4d4b, #ff7979);
            border-radius: 20px;
            transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .quote-section {
            margin-top: 25px;
            padding: 18px;
            border-radius: 18px;
            border-left: 5px solid #1e3799;
            background: #f1f2f6;
            text-align: left;
        }

        .celebrate-text {
            color: #eb4d4b !important;
            font-weight: 900;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="magazine-card w-full max-w-sm text-center mx-4">
        
        <div class="current-time-tag">
            <div id="current-date" class="text-[11px] font-bold opacity-75 mb-1 tracking-[0.2em] uppercase">LOADING...</div>
            <div id="current-time" class="text-4xl font-black tabular-nums tracking-tighter">00:00:00</div>
        </div>

        <div class="video-container shadow-md">
            <video autoplay loop muted playsinline class="w-full h-auto">
                <source src="輪流探頭動圖製作完成.mp4" type="video/mp4">
            </video>
        </div>

        <div class="text-left mb-6 px-1">
            <div class="flex items-center gap-2 mb-1">
                <span class="w-8 h-[2px] bg-blue-700"></span>
                <h2 class="text-[10px] font-bold text-blue-700 tracking-[0.3em] uppercase">Freedom Log</h2>
            </div>
            <h3 class="text-2xl font-black text-slate-800">2027.03.01 解放</h3>
        </div>

        <div class="grid grid-cols-4 gap-3 mb-8">
            <div class="time-box shadow-sm"><span id="days">00</span><span class="time-unit">DAYS</span></div>
            <div class="time-box shadow-sm"><span id="hours">00</span><span class="time-unit">HRS</span></div>
            <div class="time-box shadow-sm"><span id="mins">00</span><span class="time-unit">MINS</span></div>
            <div class="time-box shadow-sm"><span id="secs">00</span><span class="time-unit">SECS</span></div>
        </div>

        <div class="px-1">
            <div class="flex justify-between text-[11px] font-bold text-slate-500 mb-1.5">
                <span>PROGRESS</span>
                <span id="percent-text" class="text-blue-800">0%</span>
            </div>
            <div class="progress-outer">
                <div id="progress-inner" class="progress-inner" style="width: 0%"></div>
            </div>
        </div>

        <div class="quote-section">
            <p id="quote" class="text-[15px] font-medium leading-relaxed text-slate-600">正在同步自由進度...</p>
        </div>

        <div class="mt-8 text-[10px] text-slate-300 font-bold tracking-[0.4em]">
            SINCE 2026 . DESIGN FOR FREEDOM
        </div>
    </div>

    <script>
        const targetDate = new Date("March 1, 2027 00:00:00").getTime();
        const startDate = new Date("February 26, 2026 00:00:00").getTime();

        const quotes = [
            "工作是為了支撐你的貓咪跟遊戲，不是全部。",
            "這份薪水包含了一部分的忍耐費。",
            "每天學著放過自己，你已經很棒了!!。",
            "再忍一下，休息是為了以後走更遠的路。",
            "倒數是為了提醒自己，痛苦都有終點。",
            "未來的你在 2027 年等待著。"
        ];

        let hasConfettiShown = false;

        function update() {
            const now = new Date();
            const nowTime = now.getTime();
            const diff = targetDate - nowTime;

            const dateStr = now.toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, ' . ');
            document.getElementById("current-date").innerText = dateStr;
            document.getElementById("current-time").innerText = now.toTimeString().split(' ')[0];

            const quoteEl = document.getElementById("quote");
            if (now.getDate() === 25) {
                quoteEl.classList.add("celebrate-text");
                quoteEl.innerText = "✨ 本月忍耐費已入帳，辛苦了！ ✨";
                if (!hasConfettiShown) {
                    launchConfetti();
                    hasConfettiShown = true;
                }
            } else {
                quoteEl.classList.remove("celebrate-text");
                hasConfettiShown = false; 
            }

            if (diff <= 0) {
                document.querySelector(".magazine-card").innerHTML = "<h1 class='text-3xl font-black p-10 text-slate-800 text-center'>Free At Last.</h1>";
                return;
            }

            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2,'0');
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2,'0');
            document.getElementById("mins").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2,'0');
            document.getElementById("secs").innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2,'0');

            const total = targetDate - startDate;
            const elapsed = nowTime - startDate;
            const progress = Math.min(Math.max((elapsed / total) * 100, 0), 100);
            document.getElementById("progress-inner").style.width = progress + "%";
            document.getElementById("percent-text").innerText = progress.toFixed(5) + "%";
        }

        function launchConfetti() {
            confetti({ particleCount: 60, spread: 80, origin: { y: 0.85 }, colors: ['#1e3799', '#eb4d4b', '#ffffff'] });
        }

        setInterval(() => {
            if (new Date().getDate() !== 25) {
                const q = quotes[Math.floor(Math.random() * quotes.length)];
                document.getElementById("quote").innerText = `「${q}」`;
            }
        }, 8000);

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
