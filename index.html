<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2027.03.01 自由倒數 🐾</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;500;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* 套用 Zen Maru Gothic：日系設計的靈魂圓體 */
        * {
            font-family: 'Zen Maru Gothic', sans-serif !important;
            letter-spacing: 0.05em;
        }
        
        body {
            background-color: #F7F7F7; /* 日系冷灰色調 */
            background-image: url('BG.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .label-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 40px;
        }

        /* 頂部標籤：像產品說明的精緻標籤 */
        .status-tag {
            display: inline-flex;
            align-items: center;
            background: #333;
            color: #FFF;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        /* 倒數盒子：極細邊框與高級配色 */
        .time-box {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid #E5E7EB;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            transition: all 0.3s ease;
        }
        .time-box:hover {
            background: #FFF;
            border-color: #333;
            transform: translateY(-2px);
        }

        .time-box span:first-child {
            color: #111;
            font-size: 2.2rem;
            font-weight: 900;
            line-height: 1;
        }

        .time-unit {
            font-size: 10px;
            color: #999;
            margin-top: 4px;
            font-weight: 700;
        }

        /* 對話框：無印良品感的簡約邊框 */
        .quote-box {
            border-top: 1px solid #EEE;
            padding-top: 20px;
            margin-top: 30px;
            text-align: left;
        }

        .quote-label {
            font-size: 9px;
            color: #BBB;
            font-weight: 900;
            margin-bottom: 8px;
            display: block;
        }

        .video-container {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            margin-bottom: 24px;
        }

        /* 進度條：細緻的點狀質感 */
        .progress-container {
            height: 2px;
            background: #E5E7EB;
            border-radius: 2px;
            position: relative;
            margin: 15px 0;
        }
        .progress-bar {
            height: 100%;
            background: #333;
            transition: width 1s ease-in-out;
        }

        .celebrate-text {
            color: #FF5252 !important;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="label-card w-full max-w-sm text-center mx-4">
        
        <div class="status-tag">REAL-TIME MONITOR</div>
        <div class="mb-8">
            <div id="current-date" class="text-[11px] font-bold text-gray-400 mb-1 tracking-[0.2em]">LOADING...</div>
            <div id="current-time" class="text-4xl font-medium text-gray-800 tabular-nums tracking-tighter">00:00:00</div>
        </div>

        <div class="video-container">
            <video autoplay loop muted playsinline class="w-full h-auto opacity-90">
                <source src="輪流探頭動圖製作完成.mp4" type="video/mp4">
            </video>
        </div>

        <div class="text-left mb-6">
            <span class="text-[9px] font-black text-white bg-gray-400 px-1.5 py-0.5 rounded mr-2">GOAL</span>
            <h2 class="text-lg font-bold text-gray-800 inline">自由解放日 2027</h2>
        </div>

        <div class="grid grid-cols-4 gap-3 mb-8">
            <div class="time-box shadow-sm"><span id="days">00</span><span class="time-unit">DAYS</span></div>
            <div class="time-box shadow-sm"><span id="hours">00</span><span class="time-unit">HOUR</span></div>
            <div class="time-box shadow-sm"><span id="mins">00</span><span class="time-unit">MINS</span></div>
            <div class="time-box shadow-sm"><span id="secs">00</span><span class="time-unit">SECS</span></div>
        </div>

        <div class="px-1">
            <div class="flex justify-between text-[9px] font-black text-gray-400">
                <span>PROGRESS TO FREEDOM</span>
                <span id="percent-text">0%</span>
            </div>
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
            </div>
        </div>

        <div class="quote-box">
            <span class="quote-label">DAILY_LOG</span>
            <p id="quote" class="text-[13px] font-medium leading-relaxed text-gray-500">正在同步自由數據...</p>
        </div>

        <div class="mt-8 text-[9px] text-gray-300 font-bold tracking-[0.3em]">
            SYSTEM_VERSION_2026.01
        </div>
    </div>

    <script>
        const targetDate = new Date("March 1, 2027 00:00:00").getTime();
        const startDate = new Date("February 26, 2026 00:00:00").getTime();

        const quotes = [
            "工作是為了支撐貓咪，不是你的全部。",
            "這份薪水包含了一部分的忍耐費。",
            "每天學著放過自己，你已經很棒了。",
            "再忍一下，休息是為了走更遠的路。",
            "所有的痛苦都有終點。",
            "未來的你在 2027 年等待著。"
        ];

        let hasConfettiShown = false;

        function update() {
            const now = new Date();
            const nowTime = now.getTime();
            const diff = targetDate - nowTime;

            const dateOptions = { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' };
            document.getElementById("current-date").innerText = now.toLocaleDateString('zh-TW', dateOptions).replace(/\//g, ' / ');
            document.getElementById("current-time").innerText = now.toTimeString().split(' ')[0];

            const quoteEl = document.getElementById("quote");
            if (now.getDate() === 25) {
                quoteEl.classList.add("celebrate-text");
                quoteEl.innerText = "每月定期維護：忍耐費已續約。";
                if (!hasConfettiShown) {
                    launchConfetti();
                    hasConfettiShown = true;
                }
            } else {
                quoteEl.classList.remove("celebrate-text");
                hasConfettiShown = false; 
            }

            if (diff <= 0) {
                document.querySelector(".label-card").innerHTML = "<h1 class='text-xl font-bold p-10 text-gray-800 text-center'>MISSION COMPLETED.</h1>";
                return;
            }

            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2,'0');
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2,'0');
            document.getElementById("mins").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2,'0');
            document.getElementById("secs").innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2,'0');

            const total = targetDate - startDate;
            const elapsed = nowTime - startDate;
            const progress = Math.min(Math.max((elapsed / total) * 100, 0), 100);
            document.getElementById("progress-bar").style.width = progress + "%";
            document.getElementById("percent-text").innerText = progress.toFixed(5) + "%";
        }

        function launchConfetti() {
            confetti({ particleCount: 40, spread: 70, origin: { y: 0.8 }, colors: ['#333333', '#CCCCCC'] });
        }

        setInterval(() => {
            if (new Date().getDate() !== 25) {
                const q = quotes[Math.floor(Math.random() * quotes.length)];
                document.getElementById("quote").innerText = q;
            }
        }, 8000);

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
