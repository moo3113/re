<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2027.03.01 自由倒數 🐾</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', 'Kosugi Maru', sans-serif;
            background-color: #87CEEB;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 3px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cartoon-card {
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid #4a4a4a;
            border-radius: 30px;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.15);
        }

        .time-box {
            background: #fff;
            border: 3px solid #4a4a4a;
            border-radius: 15px;
            color: #4a4a4a;
        }

        .cat-runner {
            position: absolute;
            right: -25px;
            top: -40px;
            width: 50px;
            transition: all 1s linear;
        }
        
        .speech-bubble {
            position: relative;
            background: #fdf6e3;
            border: 3px solid #4a4a4a;
            border-radius: 15px;
            color: #4a4a4a;
            padding: 15px;
        }
    </style>
</head>
<body>

    <div class="cartoon-card w-full max-w-md p-8 text-center relative mx-4">
        
        <div class="flex justify-center mb-4">
            <img src="https://i.imgur.com/8vQ6Y8X.png" alt="Calico Cat" class="w-28 h-28 object-contain">
        </div>

        <h1 class="text-xs uppercase tracking-[0.3em] text-gray-400 mb-1 font-bold">Freedom Countdown</h1>
        <h2 class="text-2xl font-bold mb-6 text-gray-800 border-b-2 border-gray-100 pb-2">自由解放日：2027.03.01</h2>

        <div class="grid grid-cols-4 gap-2 mb-8">
            <div class="time-box p-2">
                <span id="days" class="text-2xl font-extrabold block">00</span>
                <span class="text-[10px] font-bold opacity-60">天</span>
            </div>
            <div class="time-box p-2">
                <span id="hours" class="text-2xl font-extrabold block">00</span>
                <span class="text-[10px] font-bold opacity-60">時</span>
            </div>
            <div class="time-box p-2">
                <span id="mins" class="text-2xl font-extrabold block">00</span>
                <span class="text-[10px] font-bold opacity-60">分</span>
            </div>
            <div class="time-box p-2">
                <span id="secs" class="text-2xl font-extrabold block">00</span>
                <span class="text-[10px] font-bold opacity-60">秒</span>
            </div>
        </div>

        <div class="mb-8 text-left relative">
            <div class="flex justify-between text-xs mb-2 font-bold text-gray-600">
                <span>自由進度</span>
                <span id="percent-text">0%</span>
            </div>
            <div class="w-full bg-gray-200 h-4 rounded-full border-2 border-gray-400 relative">
                <div id="progress-bar" class="h-full bg-gradient-to-r from-yellow-400 to-orange-500 rounded-full transition-all duration-1000" style="width: 0%">
                    <img src="https://i.imgur.com/wO6L1o1.png" class="cat-runner" alt="Black Cat">
                </div>
            </div>
        </div>

        <div class="min-h-[80px] flex items-center justify-center speech-bubble">
            <p id="quote" class="text-sm font-bold leading-relaxed">「載入自由中...🐾」</p>
        </div>

        <div class="mt-8 pt-4 text-[10px] text-gray-400 font-bold">
            🐈 三花招財，黑貓避邪，2027 準時登出！
        </div>
    </div>

    <script>
        const targetDate = new Date("March 1, 2027 00:00:00").getTime();
        const startDate = new Date("February 26, 2026 00:00:00").getTime();

        // 回歸最開始提供的語錄內容
        const quotes = [
            "每一分秒的忍耐，都是在為自由存錢。",
            "這個位子不值得你流淚，只值得你倒數。",
            "老闆的囉唆，現在聽起來都像背景音樂。",
            "再忍一下，外面的空氣是甜的。",
            "保持優雅，因為你快要不用看到這群人了。",
            "工作只是為了支撐你的興趣，不是你的全部。",
            "這份薪水包含了一部分的忍耐費。",
            "老闆沒你的日子也會過，但你沒老闆的日子會更好。"
        ];

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.querySelector(".cartoon-card").innerHTML = `
                    <h1 class='text-4xl font-bold text-gray-800'>🎉 你自由了！</h1>
                    <img src='https://i.imgur.com/8vQ6Y8X.png' class='my-4 w-32 mx-auto'>
                    <p class='text-lg font-bold'>再見了，各位同事！🐾</p>
                `;
                return;
            }

            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("mins").innerText = m.toString().padStart(2, '0');
            document.getElementById("secs").innerText = s.toString().padStart(2, '0');

            const totalTime = targetDate - startDate;
            const elapsedTime = now - startDate;
            const progress = Math.min(Math.max((elapsedTime / totalTime) * 100, 0), 100);
            
            document.getElementById("progress-bar").style.width = progress + "%";
            document.getElementById("percent-text").innerText = progress.toFixed(5) + "%";
        }

        // 每 12 秒換一句語錄
        setInterval(() => {
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById("quote").innerText = `「${randomQuote}」`;
        }, 12000);

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
