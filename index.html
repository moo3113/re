<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2027.03.01 自由倒數 🐾</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="shortcut icon" href="icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        * {
            font-family: 'Zen Maru Gothic', sans-serif !important;
            letter-spacing: 0.05em;
        }
        
        body {
            background-color: #E0E5EC;
            background-image: url('BG.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .airy-card {
            background: rgba(255, 250, 240, 0.95);
            border: 2px solid #5D4037;
            border-radius: 35px;
            box-shadow: 12px 12px 0px rgba(93, 64, 55, 0.1);
            padding: 40px;
            color: #5D4037;
        }

        .current-time-section {
            background: #5D4037;
            color: #FFF9F0;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 30px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .time-box {
            background: #FFF;
            border: 2px solid #5D4037;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
        }

        .time-box span:first-child {
            color: #2D3436;
            font-size: 2.2rem;
            font-weight: 900;
            line-height: 1;
        }

        .time-unit {
            font-size: 11px;
            color: #8D6E63;
            margin-top: 4px;
            font-weight: 700;
        }

        .video-container {
            width: 100%;
            border-radius: 25px;
            overflow: hidden;
            border: 3px solid #5D4037;
            margin-bottom: 30px;
        }

        .progress-container {
            height: 12px;
            background: #EEDCC6;
            border-radius: 10px;
            margin: 15px 0;
            border: 2px solid #5D4037;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(to right, #FFB74D, #FF8A65);
            transition: width 1s ease-in-out;
        }

        .speech-bubble {
            background: #FFF;
            border: 2px solid #5D4037;
            border-radius: 15px;
            padding: 12px;
            margin-top: 20px;
            font-size: 15px;
            font-weight: 700;
            color: #5D4037;
        }

        .celebrate-text {
            color: #E64A19 !important;
            animation: soft-pulse 0.8s infinite alternate;
        }

        @keyframes soft-pulse {
            from { transform: scale(1); }
            to { transform: scale(1.03); }
        }
    </style>
</head>
<body>

    <div class="airy-card w-full max-w-sm text-center mx-4">
        
        <div class="current-time-section">
            <div id="current-date" class="text-[11px] font-bold opacity-80 mb-1 tracking-widest uppercase">LOADING...</div>
            <div id="current-time" class="text-4xl font-black tabular-nums tracking-tighter">00:00:00</div>
        </div>

        <div class="video-container">
            <video autoplay loop muted playsinline class="w-full h-auto">
                <source src="輪流探頭動圖製作完成.mp4" type="video/mp4">
            </video>
        </div>

        <div class="text-left mb-6 px-1">
            <h3 class="text-lg font-black text-[#5D4037] border-b-2 border-[#5D4037] pb-1 inline-block">自由解放：2027.03.01</h3>
        </div>

        <div class="grid grid-cols-4 gap-3 mb-8">
            <div class="time-box shadow-sm"><span id="days">00</span><span class="time-unit">日</span></div>
            <div class="time-box shadow-sm"><span id="hours">00</span><span class="time-unit">時</span></div>
            <div class="time-box shadow-sm"><span id="mins">00</span><span class="time-unit">分</span></div>
            <div class="time-box shadow-sm"><span id="secs">00</span><span class="time-unit">秒</span></div>
        </div>

        <div class="px-1">
            <div class="flex justify-between text-[11px] font-black text-[#5D4037] mb-1">
                <span>🐾 自由進度</span>
                <span id="percent-text">0%</span>
            </div>
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
            </div>
        </div>

        <div class="speech-bubble shadow-inner">
            <p id="quote">正在載入自由...</p>
        </div>

        <div class="mt-8 text-[10px] text-gray-400 font-bold italic tracking-[0.2em]">
            🐈 KEEP CALM AND WAIT FOR FREEDOM 🐾
        </div>
    </div>

    <script>
        const targetDate = new Date("March 1, 2027 00:00:00").getTime();
        const startDate = new Date("February 26, 2026 00:00:00").getTime();

        const quotes = [
            "工作是為了支撐你的貓咪跟遊戲，不是全部。",
            "這份薪水包含了一部分的忍耐費。",
            "每天學著放過自己，你已經很棒了!!。",
            "再忍一下，休息是為了以後走更遠的路。",
            "倒數是為了提醒自己，痛苦都有終點。",
            "未來的你在 2027 年 3 月等著你。"
        ];

        let hasConfettiShown = false;

        function update() {
            const now = new Date();
            const nowTime = now.getTime();
            const diff = targetDate - nowTime;

            const dateOptions = { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' };
            document.getElementById("current-date").innerText = now.toLocaleDateString('zh-TW', dateOptions).replace(/\//g, ' . ');
            document.getElementById("current-time").innerText = now.toTimeString().split(' ')[0];

            const quoteEl = document.getElementById("quote");
            if (now.getDate() === 25) {
                quoteEl.classList.add("celebrate-text");
                quoteEl.innerText = "✨ 薪水入帳，忍耐費已續約 ✨";
                if (!hasConfettiShown) {
                    launchConfetti();
                    hasConfettiShown = true;
                }
            } else {
                quoteEl.classList.remove("celebrate-text");
                hasConfettiShown = false; 
            }

            if (diff <= 0) {
                document.querySelector(".airy-card").innerHTML = "<h1 class='text-2xl font-bold p-10 text-[#5D4037] text-center'>終於，自由了！🐾</h1>";
                return;
            }

            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2,'0');
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2,'0');
            document.getElementById("mins").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2,'0');
            document.getElementById("secs").innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2,'0');

            const total = targetDate - startDate;
            const elapsed = nowTime - startDate;
            const progress = Math.min(Math.max((elapsed / total) * 100, 0), 100);
            document.getElementById("progress-bar").style.width = progress + "%";
            document.getElementById("percent-text").innerText = progress.toFixed(5) + "%";
        }

        function launchConfetti() {
            confetti({ particleCount: 50, spread: 70, origin: { y: 0.8 }, colors: ['#FFB74D', '#5D4037', '#FFF9F0'] });
        }

        setInterval(() => {
            if (new Date().getDate() !== 25) {
                const q = quotes[Math.floor(Math.random() * quotes.length)];
                document.getElementById("quote").innerText = `「${q}」`;
            }
        }, 8000);

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
