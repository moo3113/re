<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2027.03.01 自由倒數 🐾</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-image: url('BG.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #87CEEB;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        /* 縮小後的倒數框 */
        .cartoon-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 3px solid #333; /* 邊框也稍微減細 */
            border-radius: 25px;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.15);
            width: 90%; /* 手機版寬度 */
            max-width: 320px; /* 原本是 448px (max-w-md)，現在縮小到 320px */
            padding: 1.5rem !important; /* 縮小內邊距 */
        }

        .time-box {
            background: #fdf6e3;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 0.4rem !important;
        }

        .speech-bubble {
            background: #fff9db;
            border: 2px solid #333;
            border-radius: 12px;
            position: relative;
            min-height: 60px !important; /* 語錄框也縮小高度 */
        }

        .video-container {
            width: 100%;
            border-radius: 15px;
            border: 2px solid #eee;
            overflow: hidden;
            background: #fff;
            max-height: 140px; /* 限制影片顯示高度 */
        }
    </style>
</head>
<body>

    <div class="cartoon-card text-center relative mx-4">
        
        <div class="flex justify-center mb-3 video-container">
            <video autoplay loop muted playsinline class="w-full h-auto object-cover">
                <source src="輪流探頭動圖製作完成.mp4" type="video/mp4">
            </video>
        </div>

        <h1 class="text-[9px] uppercase tracking-[0.2em] text-gray-400 mb-1 font-bold">Freedom Countdown</h1>
        <h2 class="text-xl font-bold mb-4 text-gray-800 border-b-2 border-gray-100 pb-2">2027.03.01</h2>

        <div class="grid grid-cols-4 gap-2 mb-6">
            <div class="time-box">
                <span id="days" class="text-xl font-black block text-gray-700">00</span>
                <span class="text-[9px] font-bold opacity-60 text-gray-500">天</span>
            </div>
            <div class="time-box">
                <span id="hours" class="text-xl font-black block text-gray-700">00</span>
                <span class="text-[9px] font-bold opacity-60 text-gray-500">時</span>
            </div>
            <div class="time-box">
                <span id="mins" class="text-xl font-black block text-gray-700">00</span>
                <span class="text-[9px] font-bold opacity-60 text-gray-500">分</span>
            </div>
            <div class="time-box">
                <span id="secs" class="text-xl font-black block text-gray-700">00</span>
                <span class="text-[9px] font-bold opacity-60 text-gray-500">秒</span>
            </div>
        </div>

        <div class="mb-6 text-left relative px-1">
            <div class="flex justify-between text-[10px] mb-1 font-bold text-gray-600">
                <span>自由進度</span>
                <span id="percent-text">0%</span>
            </div>
            <div class="w-full bg-gray-200 h-3 rounded-full border-2 border-gray-400 relative">
                <div id="progress-bar" class="h-full bg-gradient-to-r from-yellow-400 to-orange-500 rounded-full transition-all duration-1000" style="width: 0%"></div>
            </div>
        </div>

        <div class="speech-bubble p-3 flex items-center justify-center text-center">
            <p id="quote" class="text-xs font-bold leading-relaxed text-gray-700">「正在載入自由...🐾」</p>
        </div>

        <div class="mt-4 pt-2 text-[10px] text-gray-400 font-bold">
            🐈 自由的空氣就在眼前！🐾
        </div>
    </div>

    <script>
        const targetDate = new Date("March 1, 2027 00:00:00").getTime();
        const startDate = new Date("February 26, 2026 00:00:00").getTime();

        const quotes = [
            "工作只是為了支撐你的貓咪跟遊戲，不是你的全部。",
            "這份薪水包含了一部分的忍耐費。",
            "老闆沒你的日子也會過，但你沒老闆的日子會更好。",
            "再忍一下，休息是為了有更遠的路。",
            "倒數是為了提醒自己，所有的痛苦都有終點。",
            "未來的你在 2027 年 3 月等著你。"
        ];

        function update() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff <= 0) {
                document.querySelector(".cartoon-card").innerHTML = "<h1 class='text-2xl font-bold p-10 text-gray-800 text-center'>🎉 你自由了！🐾</h1>";
                return;
            }

            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2,'0');
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2,'0');
            document.getElementById("mins").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2,'0');
            document.getElementById("secs").innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2,'0');

            const total = targetDate - startDate;
            const elapsed = now - startDate;
            const progress = Math.min(Math.max((elapsed / total) * 100, 0), 100);
            
            document.getElementById("progress-bar").style.width = progress + "%";
            document.getElementById("percent-text").innerText = progress.toFixed(5) + "%";
        }

        setInterval(() => {
            const q = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById("quote").innerText = `「${q}」`;
        }, 12000);

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
