<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2027.03.01 自由倒數 🐾</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="自由倒數">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        * {
            font-family: 'Zen Maru Gothic', sans-serif !important;
            letter-spacing: 0.08em;
        }
        
        body {
            background-color: #f0f2f5;
            background-image: url('BG.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        /* 調整：高對比清透卡片 */
        .magazine-card {
            background: rgba(255, 255, 255, 0.92); /* 提高不透明度讓底色明顯 */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            padding: 35px;
            color: #2d3436; /* 深灰偏黑，增加易讀性 */
        }

        /* 現在時間：精緻深藍標籤 */
        .current-time-tag {
            background: #0984e3; /* 明亮的深藍色 */
            color: #ffffff;
            border-radius: 20px;
            padding: 10px 25px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(9, 132, 227, 0.3);
        }

        /* 倒數盒子：雜誌排版感 */
        .time-box {
            background: #ffffff;
            border: 2px solid #dfe6e9;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            transition: all 0.3s ease;
        }
        .time-box:hover {
            border-color: #0984e3;
            transform: translateY(-3px);
        }

        .time-box span:first-child {
            color: #2d3436;
            font-size: 2.3rem;
            font-weight: 900;
            line-height: 1;
        }

        .time-unit {
            font-size: 11px;
            color: #636e72;
            margin-top: 5px;
            font-weight: 700;
        }

        .video-container {
            width: 100%;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
            background: #000;
        }

        /* 進度條：明顯的暖橘色 */
        .progress-outer {
            height: 8px;
            background: #dfe6e9;
            border-radius: 10px;
            margin: 15px 0;
            overflow: hidden;
        }
        .progress-inner {
            height: 100%;
            background: linear-gradient(to right, #ff7675, #fab1a0);
            border-radius: 10px;
            transition: width 1s ease-in-out;
        }

        .quote-section {
            margin-top: 25px;
            padding: 15px;
            border-left: 3px solid #0984e3;
            background: rgba(9, 132, 227, 0.05);
            text-align: left;
        }

        .celebrate-text {
            color: #d63031 !important;
            font-weight: 900;
        }
    </style>
</head>
<body>

    <div class="magazine-card w-full max-w-sm text-center mx-4">
        
        <div class="current-time-tag">
            <div id="current-date" class="text-[10px] font-bold opacity-80 mb-0.5 tracking-[0.2em] uppercase">LOADING...</div>
            <div id="current-time" class="text-3xl font-black tabular-nums tracking-tighter">00:00:00</div>
        </div>

        <div class="video-container shadow-lg">
            <video autoplay loop muted playsinline class="w-full h-auto">
                <source src="輪流探頭動圖製作完成.mp4" type="video/mp4">
            </video>
        </div>

        <div class="text-left mb-6 px-1">
            <h2 class="text-[10px] font-bold text-blue-500 tracking-[0.3em] uppercase mb-1">— Freedom Project</h2>
            <h3 class="text-xl font-black text-gray-800">2027.03.01 自由解放</h3>
        </div>

        <div class="grid grid-cols-4 gap-3 mb-8">
            <div class="time-box shadow-sm"><span id="days">00</span><span class="time-unit">DAYS</span></div>
            <div class="time-box shadow-sm"><span id="hours">00</span><span class="time-unit">HRS</span></div>
            <div class="time-box shadow-sm"><span id="mins">00</span><span class="time-unit">MINS</span></div>
            <div class="time-box shadow-sm"><span id="secs">00</span><span class="time-unit">SECS</span></div>
        </div>

        <div class="px-1">
            <div class="flex justify-between text-[11px] font-bold text-gray-500 mb-1">
                <span>PROGRESS</span>
                <span id="percent-text" class="text-blue-600">0%</span>
            </div>
            <div class="progress-outer">
                <div id="progress-inner" class="progress-inner" style="width: 0%"></div>
            </div>
        </div>

        <div class="quote-section">
            <p id="quote" class="text-[14px] font-medium leading-relaxed text-gray-600">正在讀取自由的數據...</p>
        </div>

        <div class="mt-8 text-[9px] text-gray-300 font-bold tracking-[0.4em]">
            SINCE 2026 . TAIWAN
        </div>
    </div>

    <script>
        const targetDate = new Date("March 1, 2027 00:00:00").getTime();
        const startDate = new Date("February 26, 2026 00:00:00").getTime();

        const quotes = [
            "工作只是為了支撐你的貓咪跟遊戲，不是全部。",
            "這份薪水包含了一部分的忍耐費。",
            "每天學著放過自己，你已經很棒了!!。",
            "再忍一下，休息是為了以後走更遠的路。",
            "倒數是為了提醒自己，痛苦都有終點。",
            "未來的你在 2027 年等待著。"
        ];

        let hasConfettiShown = false;

        function update() {
            const now = new Date();
            const nowTime = now.getTime();
            const diff = targetDate - nowTime;

            const dateStr = now.toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, ' . ');
            document.getElementById("current-date").innerText = dateStr;
            document.getElementById("current-time").innerText = now.toTimeString().split(' ')[0];

            const quoteEl = document.getElementById("quote");
            if (now.getDate() === 25) {
                quoteEl.classList.add("celebrate-text");
                quoteEl.innerText = "✨ 本月忍耐費已入帳，辛苦了。 ✨";
                if (!hasConfettiShown) {
                    launchConfetti();
                    hasConfettiShown = true;
                }
            } else {
                quoteEl.classList.remove("celebrate-text");
                hasConfettiShown = false; 
            }

            if (diff <= 0) {
                document.querySelector(".magazine-card").innerHTML = "<h1 class='text-2xl font-black p-10 text-gray-800 text-center'>Free At Last.</h1>";
                return;
            }

            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2,'0');
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2,'0');
            document.getElementById("mins").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2,'0');
            document.getElementById("secs").innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2,'0');

            const total = targetDate - startDate;
            const elapsed = nowTime - startDate;
            const progress = Math.min(Math.max((elapsed / total) * 100, 0), 100);
            document.getElementById("progress-inner").style.width = progress + "%";
            document.getElementById("percent-text").innerText = progress.toFixed(5) + "%";
        }

        function launchConfetti() {
            confetti({ particleCount: 50, spread: 70, origin: { y: 0.8 }, colors: ['#0984e3', '#ff7675', '#ffffff'] });
        }

        setInterval(() => {
            if (new Date().getDate() !== 25) {
                const q = quotes[Math.floor(Math.random() * quotes.length)];
                document.getElementById("quote").innerText = `「${q}」`;
            }
        }, 8000);

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
