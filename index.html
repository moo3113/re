<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2027.03.01 自由倒數 🐾</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="自由倒數">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Nanum+Pen+Script&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* 全域套用Q彈圓體，單位套用手寫體 */
        * {
            font-family: 'Zen Maru Gothic', sans-serif !important;
            letter-spacing: 0.08em; /* 增加字距營造呼吸感 */
        }
        
        body {
            background-color: #2F3640; /* 霧灰藍底色 (黎明天空) */
            background-image: url('BG.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        /* 調整：紮實明顯底色的貓耳卡片 */
        .cat-free-card {
            background: rgba(255, 255, 255, 0.98); /* 紮實白色底色 */
            border: 2px solid #57606F; /* 深灰色毛色邊框 */
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); /* 深沉的陰影 */
            padding: 35px;
            color: #2F3640;
            position: relative;
        }

        /* 貓耳形狀裝飾 (黎明色) */
        .cat-free-card::before, .cat-free-card::after {
            content: '';
            position: absolute;
            top: -20px;
            width: 50px;
            height: 40px;
            background: rgba(255, 255, 255, 0.98);
            border: 2px solid #57606F;
            border-bottom: none;
            border-radius: 20px 20px 0 0;
            z-index: -1;
        }
        .cat-free-card::before { left: 40px; transform: rotate(-8deg); }
        .cat-free-card::after { right: 40px; transform: rotate(8deg); }

        /* 現在時間：黎明天空藍標籤 */
        .current-time-label {
            background: #57606F; /* 深灰藍 */
            color: #ffffff;
            border-radius: 20px;
            padding: 10px 25px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(87, 96, 111, 0.3);
        }

        /* 倒數盒子：置中對齊且極簡無背景 */
        .time-box {
            background: transparent;
            border: 1px solid #CED6E0; /* 極細邊框，降低束縛感 */
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .time-box:hover {
            border-color: #A5B1C2;
            background: rgba(87, 96, 111, 0.02);
            transform: translateY(-3px);
        }

        .time-box span:first-child {
            color: #2F3640;
            font-size: 2.3rem;
            font-weight: 900;
            line-height: 1;
        }

        /* 單位使用律動手寫體 */
        .time-unit {
            font-family: 'Nanum Pen Script', cursive !important;
            font-size: 16px;
            color: #747D8C;
            margin-top: -2px;
            font-weight: bold;
        }

        .video-container {
            width: 100%;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.03);
            margin-bottom: 30px;
            background: #000;
        }

        /* 進度條：黎明天空漸層 */
        .progress-outer {
            height: 6px; /* 極細進度條，像地平線 */
            background: #CED6E0;
            border-radius: 20px;
            margin: 15px 0;
            overflow: hidden;
        }
        .progress-inner {
            height: 100%;
            background: linear-gradient(to right, #A5B1C2, #57606F); /* 霧藍漸層 */
            border-radius: 20px;
            transition: width 1s ease-in-out;
        }

        /* 自由對話框：極簡線條區隔 */
        .quote-bubble {
            border-left: 3px solid #57606F;
            padding-left: 1.2rem;
            margin-top: 1.5rem;
            text-align: left;
            font-size: 14px;
            color: #747D8C;
            font-style: italic;
            line-height: 1.6;
        }

        .celebrate-text {
            color: #A5B1C2 !important; /* 黎明白金色 */
            font-weight: 900;
        }
    </style>
</head>
<body>

    <div class="cat-free-card w-full max-w-sm text-center mx-4">
        
        <div class="current-time-label">
            <div id="current-date" class="text-[11px] font-bold opacity-80 mb-1 tracking-[0.2em] uppercase">LOADING...</div>
            <div id="current-time" class="text-3xl font-black tabular-nums tracking-tighter">00:00:00</div>
        </div>

        <div class="video-container shadow-sm">
            <video autoplay loop muted playsinline class="w-full h-auto opacity-95">
                <source src="輪流探頭動圖製作完成.mp4" type="video/mp4">
            </video>
        </div>

        <div class="text-left mb-6 px-1 border-l-2 border-gray-100 pl-3">
            <h2 class="text-[10px] font-bold text-gray-300 tracking-[0.4em] uppercase mb-1">野性。自由</h2>
            <h3 class="text-xl font-black text-slate-800">2027.03.01 解放🐾</h3>
        </div>

        <div class="grid grid-cols-4 gap-3 mb-8">
            <div class="time-box"><span id="days">00</span><span class="time-unit">日</span></div>
            <div class="time-box"><span id="hours">00</span><span class="time-unit">時</span></div>
            <div class="time-box"><span id="mins">00</span><span class="time-unit">分</span></div>
            <div class="time-box"><span id="secs">00</span><span class="time-unit">秒</span></div>
        </div>

        <div class="px-1">
            <div class="flex justify-between text-[11px] font-bold text-gray-400 mb-1.5">
                <span>🐾 自由進度</span>
                <span id="percent-text" class="text-slate-700">0%</span>
            </div>
            <div class="progress-outer">
                <div id="progress-bar" class="progress-inner" style="width: 0%"></div>
            </div>
        </div>

        <div class="quote-bubble">
            <p id="quote">正在同步自由數據...</p>
        </div>

        <div class="mt-8 text-[10px] text-gray-300 font-bold italic tracking-[0.1em]">
            🐈 No limits, just freedom. 🐾
        </div>
    </div>

    <script>
        const targetDate = new Date("March 1, 2027 00:00:00").getTime();
        const startDate = new Date("February 26, 2026 00:00:00").getTime();

        const quotes = [
            "工作是為了吸貓，不是全部。",
            "這份薪水包含了一部分的忍耐費。",
            "每天學著放過自己，你已經很棒了。",
            "再忍一下，休息是為了走更遠的路。",
            "所有的痛苦都有終點。",
            "未來的你在 2027 年等待著。"
        ];

        let hasConfettiShown = false;

        function update() {
            const now = new Date();
            const nowTime = now.getTime();
            const diff = targetDate - nowTime;

            const dateStr = now.toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' }).replace(/\//g, ' . ');
            document.getElementById("current-date").innerText = dateStr;
            document.getElementById("current-time").innerText = now.toTimeString().split(' ')[0];

            const quoteEl = document.getElementById("quote");
            if (now.getDate() === 25) {
                quoteEl.classList.add("celebrate-text");
                quoteEl.innerText = "每月例行數據維護：忍耐費已續約成功。";
                if (!hasConfettiShown) {
                    launchConfetti();
                    hasConfettiShown = true;
                }
            } else {
                quoteEl.classList.remove("celebrate-text");
                hasConfettiShown = false; 
            }

            if (diff <= 0) {
                document.querySelector(".cat-free-card").innerHTML = "<h1 class='text-2xl font-black p-10 text-slate-800 text-center'>Free at last.🐾</h1>";
                return;
            }

            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2,'0');
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2,'0');
            document.getElementById("mins").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2,'0');
            document.getElementById("secs").innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2,'0');

            const total = targetDate - startDate;
            const elapsed = nowTime - startDate;
            const progress = Math.min(Math.max((elapsed / total) * 100, 0), 100);
            document.getElementById("progress-bar").style.width = progress + "%";
            document.getElementById("percent-text").innerText = progress.toFixed(5) + "%";
        }

        function launchConfetti() {
            confetti({ particleCount: 50, spread: 70, origin: { y: 0.8 }, colors: ['#57606F', '#A5B1C2', '#FFFFFF'] });
        }

        setInterval(() => {
            if (new Date().getDate() !== 25) {
                const q = quotes[Math.floor(Math.random() * quotes.length)];
                document.getElementById("quote").innerText = `「${q}」`;
            }
        }, 8000);

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
