<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2027.03.01 自由倒數 🐾</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;500;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        * {
            font-family: 'Zen Maru Gothic', sans-serif !important;
            letter-spacing: 0.08em; /* 增加字距營造呼吸感 */
        }
        
        body {
            background-color: #F8F9FA;
            background-image: url('BG.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .airy-card {
            background: rgba(255, 255, 255, 0.7); /* 高透明度 */
            backdrop-filter: blur(25px); /* 強力磨砂效果 */
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
            padding: 40px;
            color: #576574;
        }

        /* 現在時間：極簡線條區隔 */
        .current-time-section {
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        /* 倒數盒子：無邊框、陰影感 */
        .time-box {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            transition: all 0.4s ease;
        }
        .time-box:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-5px);
        }

        .time-box span:first-child {
            color: #2D3436;
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1;
        }

        .time-unit {
            font-size: 11px;
            color: #A4B0BE;
            margin-top: 6px;
            font-weight: 500;
        }

        /* 影片容器：圓潤且柔和 */
        .video-container {
            width: 100%;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
            margin-bottom: 30px;
        }

        /* 進度條：細緻的莫蘭迪色 */
        .progress-container {
            height: 4px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
            margin: 20px 0;
        }
        .progress-bar {
            height: 100%;
            background: #B2BEC3;
            border-radius: 10px;
            transition: width 1s ease-in-out;
        }

        .speech-bubble {
            margin-top: 30px;
            font-size: 14px;
            color: #8395A7;
            font-style: italic;
            line-height: 1.6;
        }

        .celebrate-text {
            color: #FAB1A0 !important; /* 柔和的珊瑚色 */
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="airy-card w-full max-w-sm text-center mx-4">
        
        <div class="current-time-section">
            <div id="current-date" class="text-[11px] font-medium text-gray-400 mb-1 tracking-[0.2em]">2026 . 03 . 01</div>
            <div id="current-time" class="text-4xl font-light text-gray-700 tabular-nums tracking-tighter">00:00:00</div>
        </div>

        <div class="video-container">
            <video autoplay loop muted playsinline class="w-full h-auto opacity-90">
                <source src="輪流探頭動圖製作完成.mp4" type="video/mp4">
            </video>
        </div>

        <div class="text-left mb-6 px-2">
            <h2 class="text-[10px] font-bold text-gray-300 tracking-[0.3em] uppercase mb-1">Target Date</h2>
            <h3 class="text-xl font-bold text-gray-600">2027.03.01 自由解放</h3>
        </div>

        <div class="grid grid-cols-4 gap-3 mb-8">
            <div class="time-box shadow-sm"><span id="days">00</span><span class="time-unit">DAYS</span></div>
            <div class="time-box shadow-sm"><span id="hours">00</span><span class="time-unit">HOURS</span></div>
            <div class="time-box shadow-sm"><span id="mins">00</span><span class="time-unit">MINS</span></div>
            <div class="time-box shadow-sm"><span id="secs">00</span><span class="time-unit">SECS</span></div>
        </div>

        <div class="px-2">
            <div class="flex justify-between text-[10px] font-bold text-gray-400">
                <span>PROGRESS</span>
                <span id="percent-text">0%</span>
            </div>
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
            </div>
        </div>

        <div class="speech-bubble">
            <p id="quote">正在讀取自由的氣息...</p>
        </div>

        <div class="mt-8 text-[9px] text-gray-300 font-bold tracking-[0.4em]">
            STEADY AND SLOW
        </div>
    </div>

    <script>
        const targetDate = new Date("March 1, 2027 00:00:00").getTime();
        const startDate = new Date("February 26, 2026 00:00:00").getTime();

        const quotes = [
            "工作是為了生活，不是生活的全部。",
            "這份薪水包含了一部分的忍耐費。",
            "每天學著放過自己，你已經很棒了。",
            "再忍一下，休息是為了走更遠的路。",
            "所有的痛苦都有終點。",
            "未來的你在 2027 年等待著。"
        ];

        let hasConfettiShown = false;

        function update() {
            const now = new Date();
            const nowTime = now.getTime();
            const diff = targetDate - nowTime;

            const dateStr = now.toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, ' . ');
            document.getElementById("current-date").innerText = dateStr;
            document.getElementById("current-time").innerText = now.toTimeString().split(' ')[0];

            const quoteEl = document.getElementById("quote");
            if (now.getDate() === 25) {
                quoteEl.classList.add("celebrate-text");
                quoteEl.innerText = "本月忍耐費已入帳，辛苦了。";
                if (!hasConfettiShown) {
                    launchConfetti();
                    hasConfettiShown = true;
                }
            } else {
                quoteEl.classList.remove("celebrate-text");
                hasConfettiShown = false; 
            }

            if (diff <= 0) {
                document.querySelector(".airy-card").innerHTML = "<h1 class='text-xl font-bold p-10 text-gray-600 text-center'>終於，自由了。</h1>";
                return;
            }

            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2,'0');
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2,'0');
            document.getElementById("mins").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2,'0');
            document.getElementById("secs").innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2,'0');

            const total = targetDate - startDate;
            const elapsed = nowTime - startDate;
            const progress = Math.min(Math.max((elapsed / total) * 100, 0), 100);
            document.getElementById("progress-bar").style.width = progress + "%";
            document.getElementById("percent-text").innerText = progress.toFixed(5) + "%";
        }

        function launchConfetti() {
            confetti({ particleCount: 30, spread: 70, origin: { y: 0.8 }, colors: ['#DFE6E9', '#B2BEC3'] });
        }

        setInterval(() => {
            if (new Date().getDate() !== 25) {
                const q = quotes[Math.floor(Math.random() * quotes.length)];
                document.getElementById("quote").innerText = q;
            }
        }, 8000);

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
